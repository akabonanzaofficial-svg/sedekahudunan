    html { scroll-behavior: smooth; }

    .nav-link {

    }
    .nav-link::after {
      content: '';

      left: 0;
      width: 0;
      height: 2px;
      background: #3b82f6;
      transition: width 0.3s ease;

      const reportCategories = ["Semua", ...new Set(reports.map(r => r.program))];

      const filteredReports = reports.filter(r => {
        const matchesCategory = activeCategory === "Semua" || r.program === activeCategory;
        const matchesSearch = r.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                              r.description.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesCategory && matchesSearch;
      });

      return (
        <div className="fade-in pt-20 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
          <div className="text-center mb-10">
            <h1 className="text-3xl md:text-4xl font-bold text-neutral-800 mb-3">Laporan Penyaluran</h1>
            <p className="text-neutral-500 max-w-2xl mx-auto">Kami berkomitmen untuk transparansi penuh. Lihat bagaimana donasi Anda telah disalurkan dan siapa yang telah menerima manfaatnya.</p>
          </div>

          <div className="mb-8">
            <div className="flex items-center gap-3 mb-4">
              <div className="relative flex-1 max-w-md">
                <span className="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400">search</span>
                <input
                  type="text"
                  placeholder="Cari laporan..."
                  value={searchQuery}
                  onChange={e => setSearchQuery(e.target.value)}
                  className="w-full pl-10 pr-4 py-2.5 border border-neutral-200 rounded-xl text-sm focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100"
                />
              </div>
            </div>
            <div className="flex flex-wrap gap-2">
              {reportCategories.map(cat => (
                <button
                  key={cat}
                  onClick={() => setActiveCategory(cat)}
                  className={`category-pill px-4 py-2 rounded-full text-sm font-medium border ${activeCategory === cat ? 'active border-primary-500' : 'border-neutral-200 text-neutral-600'}`}
                >
                  {cat}
                </button>
              ))}
            </div>
          </div>

          {filteredReports.length === 0 ? (
            <div className="text-center py-16">
              <span className="material-icons text-6xl text-neutral-300 mb-4">search_off</span>
              <p className="text-neutral-500 text-lg">Tidak ada laporan yang cocok dengan pencarian Anda.</p>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {filteredReports.map(report => (
                <ReportCard
                  key={report.id}
                  report={report}
                  onClick={() => setSelectedReport(report)}
                />
              ))}
            </div>
          )}
        </div>
      );
    };

    // ==================== APP ====================
    const App = () => {
      const [currentPage, setCurrentPage] = useState('beranda');
      const [selectedCampaign, setSelectedCampaign] = useState(null);
      const [selectedReport, setSelectedReport] = useState(null);

      // Scroll to top on page change
      useEffect(() => {
        window.scrollTo(0, 0);
      }, [currentPage]);

      return (
        <div className="min-h-screen flex flex-col">
          <Header currentPage={currentPage} setPage={setCurrentPage} />

          <main className="flex-1">
            {currentPage === 'beranda' && (
              <BerandaPage setPage={setCurrentPage} setSelectedCampaign={setSelectedCampaign} />
            )}
            {currentPage === 'program' && (
              <ProgramPage setSelectedCampaign={setSelectedCampaign} />
            )}
            {currentPage === 'laporan' && (
              <LaporanPage setSelectedReport={setSelectedReport} />
            )}
          </main>

          <Footer />

          {selectedCampaign && (
            <CampaignModal
              campaign={selectedCampaign}
              onClose={() => setSelectedCampaign(null)}
            />
          )}

          {selectedReport && (
            <ReportModal
              report={selectedReport}
              onClose={() => setSelectedReport(null)}
            />
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
